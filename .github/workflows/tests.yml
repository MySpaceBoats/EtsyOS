name: tests
# Runs the real test suites that exist today (MCP/storage, MCP/image-generation,
# MCP/assets, Web). Each has its own package.json — no root workspace. Other
# MCP servers/agents/routines are still skeletons with nothing to test yet; add
# them here as they gain real code, don't pre-add placeholder steps for them.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mcp-storage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - working-directory: MCP/storage
        run: npm ci
      - working-directory: MCP/storage
        run: npm run typecheck
      - working-directory: MCP/storage
        run: npm test

  mcp-image-generation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - working-directory: MCP/image-generation
        run: npm ci
      - working-directory: MCP/image-generation
        run: npm run typecheck
      - working-directory: MCP/image-generation
        run: npm test

  mcp-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - working-directory: MCP/assets
        run: npm ci
      - working-directory: MCP/assets
        run: npm run typecheck
      - working-directory: MCP/assets
        run: npm test

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - working-directory: Web
        run: npm ci
      - working-directory: Web
        run: npm run typecheck
      - working-directory: Web
        run: npm run build
